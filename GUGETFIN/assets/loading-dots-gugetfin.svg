<svg width="120" height="36" viewBox="0 0 120 36" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Carregando">
  <defs>
    <filter id="softGlow" x="-40%" y="-70%" width="180%" height="240%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.282 0 0 0 0 0.867 0 0 0 0 0.643 0 0 0 0.55 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#softGlow)">
    <circle cx="34" cy="18" r="6" fill="#038356">
      <animate attributeName="r" values="6;9;6" dur="1.05s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;1;0.55" dur="1.05s" begin="0s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -5;0 0" dur="1.05s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="18" r="6" fill="#04B965">
      <animate attributeName="r" values="6;9;6" dur="1.05s" begin="0.16s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;1;0.55" dur="1.05s" begin="0.16s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -5;0 0" dur="1.05s" begin="0.16s" repeatCount="indefinite"/>
    </circle>
    <circle cx="86" cy="18" r="6" fill="#48DDA4">
      <animate attributeName="r" values="6;9;6" dur="1.05s" begin="0.32s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;1;0.55" dur="1.05s" begin="0.32s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -5;0 0" dur="1.05s" begin="0.32s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
