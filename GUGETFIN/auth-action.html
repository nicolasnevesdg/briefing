<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguranca da conta | GugetFin</title>
    <link rel="icon" type="image/png" href="assets/favicon-32.png">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/auth-onb.css">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(77, 238, 176, 0.18), transparent 34%),
                var(--bg-app);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .action-shell {
            width: min(100%, 980px);
            min-height: 620px;
            border: 1px solid var(--border);
            border-radius: 28px;
            background: #fff;
            box-shadow: 0 28px 70px rgba(27, 58, 50, 0.12);
            display: grid;
            grid-template-columns: 0.95fr 1.05fr;
            overflow: hidden;
        }

        .action-brand-panel {
            padding: 42px;
            background: linear-gradient(145deg, #07100f, #063924);
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 32px;
        }

        .action-brand-panel img {
            width: 156px;
            height: auto;
        }

        .action-proof {
            max-width: 440px;
        }

        .action-proof span {
            display: block;
            margin-bottom: 14px;
            color: var(--acc-green);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .action-proof h1 {
            margin: 0 0 18px;
            font-size: clamp(34px, 5vw, 56px);
            line-height: 0.95;
            letter-spacing: -0.05em;
        }

        .action-proof p {
            margin: 0;
            color: rgba(255, 255, 255, 0.72);
            font-size: 15px;
            line-height: 1.55;
            font-weight: 650;
        }

        .action-panel {
            padding: 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .action-kicker {
            color: var(--dark-green);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .action-panel h2 {
            margin: 12px 0 10px;
            color: var(--text-main);
            font-size: clamp(30px, 4vw, 44px);
            line-height: 1;
            letter-spacing: -0.05em;
        }

        .action-panel p {
            margin: 0 0 24px;
            color: var(--text-sec);
            font-size: 14px;
            line-height: 1.55;
            font-weight: 650;
        }

        .action-status {
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: var(--bg-app);
            color: var(--text-sec);
            font-size: 13px;
            line-height: 1.45;
            font-weight: 750;
        }

        .action-status.is-success {
            border-color: rgba(0, 166, 111, 0.28);
            background: rgba(0, 166, 111, 0.08);
            color: var(--dark-green);
        }

        .action-status.is-error {
            border-color: rgba(255, 93, 93, 0.28);
            background: rgba(255, 93, 93, 0.08);
            color: #9f1d1d;
        }

        .action-form {
            display: none;
            flex-direction: column;
            gap: 14px;
            margin-top: 22px;
        }

        .action-form.is-visible {
            display: flex;
        }

        .action-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .action-field span {
            color: var(--text-sec);
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .action-input {
            width: 100%;
            min-height: 52px;
            padding: 0 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--bg-app);
            color: var(--text-main);
            font: inherit;
            font-weight: 750;
            box-sizing: border-box;
            outline: none;
        }

        .action-input:focus {
            border-color: var(--acc-green);
            box-shadow: 0 0 0 4px rgba(77, 238, 176, 0.18);
        }

        .action-primary,
        .action-secondary {
            min-height: 52px;
            border: 0;
            border-radius: 14px;
            font: inherit;
            font-weight: 900;
            cursor: pointer;
        }

        .action-primary {
            margin-top: 4px;
            background: var(--dark-green);
            color: #fff;
        }

        .action-secondary {
            margin-top: 18px;
            background: rgba(0, 166, 111, 0.1);
            color: var(--dark-green);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 0 18px;
            align-self: flex-start;
        }

        @media (max-width: 860px) {
            body {
                align-items: stretch;
                padding: 0;
            }

            .action-shell {
                min-height: 100vh;
                border: 0;
                border-radius: 0;
                grid-template-columns: 1fr;
            }

            .action-brand-panel {
                min-height: 220px;
                padding: 28px;
            }

            .action-proof h1 {
                font-size: 36px;
            }

            .action-panel {
                padding: 34px 24px 42px;
                justify-content: flex-start;
            }

            .action-secondary {
                width: 100%;
            }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background:
                    radial-gradient(circle at top left, rgba(77, 238, 176, 0.12), transparent 34%),
                    #080d0f;
                color: #fff;
            }

            .action-shell,
            .action-panel {
                background: #11161c;
                border-color: rgba(255, 255, 255, 0.08);
            }

            .action-panel h2,
            .action-input {
                color: #fff;
            }

            .action-status,
            .action-input {
                background: #0d1217;
                border-color: rgba(255, 255, 255, 0.08);
            }

            .action-status.is-success {
                color: var(--acc-green);
            }
        }
    </style>
</head>
<body>
    <main class="action-shell">
        <section class="action-brand-panel">
            <a href="landing.html" aria-label="Voltar ao site do GugetFin">
                <img src="assets/logo-negative.svg" alt="GugetFin">
            </a>
            <div class="action-proof">
                <span>Conta protegida</span>
                <h1>Seguranca sem travar sua rotina.</h1>
                <p>Esta etapa confirma que voce controla o e-mail da conta antes de alterar dados sensiveis.</p>
            </div>
        </section>

        <section class="action-panel">
            <span class="action-kicker" id="action-kicker">Verificacao</span>
            <h2 id="action-title">Carregando...</h2>
            <p id="action-description">Estamos validando o link recebido por e-mail.</p>
            <div class="action-status" id="action-status">Aguarde um instante.</div>

            <form class="action-form" id="reset-form">
                <label class="action-field">
                    <span>Nova senha</span>
                    <input class="action-input" type="password" id="new-password" placeholder="Minimo 6 caracteres" autocomplete="new-password">
                </label>
                <label class="action-field">
                    <span>Confirmar senha</span>
                    <input class="action-input" type="password" id="confirm-password" placeholder="Repita a nova senha" autocomplete="new-password">
                </label>
                <button class="action-primary" type="submit" id="reset-submit">Salvar nova senha</button>
            </form>

            <a class="action-secondary" href="index.html" id="back-login">Voltar para o login</a>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, confirmPasswordReset, verifyPasswordResetCode, applyActionCode } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1HyxzZ-YFMMbMSIwBDDKfNWdCWHb07AY",
            authDomain: "guget-fin.firebaseapp.com",
            projectId: "guget-fin",
            storageBucket: "guget-fin.firebasestorage.app",
            messagingSenderId: "626285959649",
            appId: "1:626285959649:web:9b1006694a4d05fa899aa0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        auth.languageCode = 'pt-BR';

        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');
        const oobCode = params.get('oobCode');
        const continueUrl = params.get('continueUrl');

        const title = document.getElementById('action-title');
        const kicker = document.getElementById('action-kicker');
        const description = document.getElementById('action-description');
        const status = document.getElementById('action-status');
        const form = document.getElementById('reset-form');
        const submit = document.getElementById('reset-submit');
        const backLogin = document.getElementById('back-login');

        if (continueUrl) {
            backLogin.href = continueUrl;
        }

        function setStatus(message, type = '') {
            status.textContent = message;
            status.className = `action-status ${type}`.trim();
        }

        function showGenericSuccess(message) {
            kicker.textContent = 'Tudo certo';
            title.textContent = 'Conta atualizada';
            description.textContent = 'A verificacao foi concluida com sucesso.';
            setStatus(message, 'is-success');
        }

        async function handleResetPassword() {
            kicker.textContent = 'Recuperacao de senha';
            title.textContent = 'Crie uma nova senha';
            description.textContent = 'Digite uma senha nova para voltar a acessar sua conta com seguranca.';

            try {
                const email = await verifyPasswordResetCode(auth, oobCode);
                setStatus(`Link validado para ${email}. Agora defina sua nova senha.`, 'is-success');
                form.classList.add('is-visible');
            } catch (error) {
                console.error(error);
                setStatus('Este link de recuperacao expirou ou ja foi usado. Solicite um novo link na tela de login.', 'is-error');
            }
        }

        async function handleVerifyEmail() {
            kicker.textContent = 'Confirmacao de e-mail';
            title.textContent = 'Confirmando seu e-mail';
            description.textContent = 'Estamos finalizando a verificacao do endereco vinculado a sua conta.';

            try {
                await applyActionCode(auth, oobCode);
                showGenericSuccess('E-mail confirmado. Voce ja pode voltar ao GugetFin.');
            } catch (error) {
                console.error(error);
                setStatus('Nao foi possivel confirmar este e-mail. O link pode ter expirado ou ja ter sido usado.', 'is-error');
            }
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const password = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (password.length < 6) {
                setStatus('A senha precisa ter pelo menos 6 caracteres.', 'is-error');
                return;
            }

            if (password !== confirm) {
                setStatus('A confirmacao da senha nao bate.', 'is-error');
                return;
            }

            submit.disabled = true;
            submit.textContent = 'Salvando...';

            try {
                await confirmPasswordReset(auth, oobCode, password);
                form.classList.remove('is-visible');
                showGenericSuccess('Senha atualizada. Voce ja pode entrar usando a nova senha.');
            } catch (error) {
                console.error(error);
                setStatus('Nao foi possivel atualizar a senha. Solicite um novo link e tente novamente.', 'is-error');
            } finally {
                submit.disabled = false;
                submit.textContent = 'Salvar nova senha';
            }
        });

        if (!mode && params.get('verified') === '1') {
            showGenericSuccess('E-mail confirmado. Voce ja pode voltar ao GugetFin.');
        } else if (!mode || !oobCode) {
            title.textContent = 'Link incompleto';
            description.textContent = 'Nao encontramos os dados necessarios para concluir esta acao.';
            setStatus('Abra novamente o link recebido por e-mail ou solicite um novo envio.', 'is-error');
        } else if (mode === 'resetPassword') {
            handleResetPassword();
        } else if (mode === 'verifyEmail') {
            handleVerifyEmail();
        } else {
            title.textContent = 'Acao nao reconhecida';
            description.textContent = 'Este tipo de link ainda nao e tratado pelo GugetFin.';
            setStatus('Volte para o login e solicite uma nova acao.', 'is-error');
        }
    </script>
</body>
</html>
